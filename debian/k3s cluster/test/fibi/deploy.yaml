apiVersion: v1
kind: PersistentVolume
metadata:
  name: ssl
  namespace: fibi
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/etc/ssl/private"
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tz
  namespace: fibi
  labels:
    type: local
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: "/etc/timezone"
    type: FileOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ssl
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tz
spec:
  storageClassName: manual
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: fibi
spec:
  selector:
    app: fibi
  ports:
    - port: 443
      targetPort: 443
      #nodePort: 30000
  #type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fibi
  template:
    metadata:
      labels:
        app: fibi
    spec:
      containers:
        - name: fibi-front
          image: registry.osupytheas.fr:443/fibi-front:latest
          ports:
            - containerPort: 443
          env:
            - name: TZ
              value: Europe/Paris
          volumeMounts:
            - mountPath: /etc/ssl/private
              name: ssl
              readOnly: false
            - mountPath: /etc/timezone
              name: tz
              readOnly: true
          imagePullPolicy: Always
        - name: fibi-api
          image: registry.osupytheas.fr:443/fibi-api:latest
          ports:
            - containerPort: 8082
          env:
            - name: TZ
              value: Europe/Paris
          imagePullPolicy: Always
          volumeMounts:
            - mountPath: /etc/ssl/private
              name: ssl
              readOnly: false
            - mountPath: /etc/timezone
              name: tz
              readOnly: true
      volumes:
      - name: ssl
        persistentVolumeClaim:
          claimName: ssl
      - name: tz
        persistentVolumeClaim:
          claimName: tz
      
